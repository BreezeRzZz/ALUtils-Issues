name: 问题反馈
description: 报告网站中的错误或异常
title: "[问题] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请勿提交账号、密码或其他个人信息。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      placeholder: 请简要说明遇到的问题。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开页面。
        2. 执行操作。
        3. 观察到问题。
  - type: input
    id: environment
    attributes:
      label: 环境
      description: 浏览器、系统或设备。
      placeholder: Chrome / Windows / Android
